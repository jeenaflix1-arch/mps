<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
<meta name="theme-color" content="#7a1f2b"/>
<title>Madni Public School Jalal Pur Khakhi — School Management System</title>
<style>
:root{
  --maroon:#7a1f2b; --maroon-2:#5b1620; --gold:#d4a017; --gold-2:#b8860b;
  --bg:#f5f1ea; --card:#ffffff; --ink:#1c1410; --muted:#6b5d57;
  --line:#e8dfd3; --ok:#0f7a4a; --warn:#b45309; --bad:#b91c1c;
  --shadow:0 10px 30px -12px rgba(122,31,43,.25);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:var(--ink)}
a{color:var(--maroon);text-decoration:none}
img{max-width:100%}
.hidden{display:none!important}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.grow{flex:1;min-width:0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:10px;font-weight:600;background:var(--maroon);color:#fff;transition:transform .08s, box-shadow .15s;box-shadow:0 4px 12px -4px rgba(122,31,43,.4);white-space:nowrap}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 18px -6px rgba(122,31,43,.5)}
.btn:active{transform:translateY(0)}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#3a2a05}
.btn.ghost{background:transparent;color:var(--maroon);border:1px solid var(--maroon)}
.btn.danger{background:var(--bad)}
.btn.ok{background:var(--ok)}
.btn.sm{padding:6px 10px;border-radius:8px;font-size:13px}
.input,select.input,textarea.input{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;outline:none;transition:border-color .15s, box-shadow .15s}
.input:focus{border-color:var(--maroon);box-shadow:0 0 0 3px rgba(122,31,43,.12)}
.label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 6px;text-transform:uppercase;letter-spacing:.04em}
.card{background:var(--card);border-radius:14px;padding:18px;box-shadow:var(--shadow);border:1px solid var(--line)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;background:#fff3d6;color:#7a5300}
.badge.ok{background:#dcfce7;color:#166534}
.badge.bad{background:#fee2e2;color:#991b1b}
.badge.info{background:#dbeafe;color:#1e40af}
.badge.live{background:#dcfce7;color:#166534}
.badge.live::before{content:"";width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 0 rgba(34,197,94,.7);animation:pulse 1.6s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.7)}70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
th{background:#fbf6ee;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700}
tbody tr:hover{background:#fbf6ee}
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--line);background:#fff}

/* TOPBAR + LAYOUT */
#app{display:none;min-height:100vh}
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;padding:10px 16px;background:linear-gradient(135deg,var(--maroon),var(--maroon-2));color:#fff;box-shadow:0 4px 20px -4px rgba(0,0,0,.2)}
.topbar img.logo{width:42px;height:42px;border-radius:50%;background:#fff;padding:2px;flex-shrink:0}
.topbar .brand{line-height:1.15;min-width:0}
.topbar .brand .t1{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .brand .t2{font-size:11px;opacity:.85}
.topbar .spacer{flex:1}
.topbar .me{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);padding:5px 10px;border-radius:999px;font-size:13px}
.topbar .me .dot{width:9px;height:9px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,.3)}
.menu-btn{display:none;width:40px;height:40px;border-radius:10px;align-items:center;justify-content:center;background:rgba(255,255,255,.12)}
.menu-btn svg{width:22px;height:22px}

.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 62px)}
.sidebar{background:#fff;border-right:1px solid var(--line);padding:14px 10px;overflow-y:auto}
.sidebar .navitem{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:#3a2a25;font-weight:500;font-size:14px;margin-bottom:2px;width:100%;text-align:left;transition:background .15s}
.sidebar .navitem:hover{background:#fbf6ee}
.sidebar .navitem.active{background:linear-gradient(135deg,var(--maroon),var(--maroon-2));color:#fff;box-shadow:0 4px 10px -4px rgba(122,31,43,.4)}
.sidebar .navitem .ico{font-size:17px;width:22px;text-align:center}
.sidebar .group{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:14px 12px 6px}
.content{padding:20px;max-width:1400px;width:100%;margin:0 auto}
.page-title{font-size:22px;font-weight:700;margin:0 0 4px;color:var(--maroon-2)}
.page-sub{color:var(--muted);font-size:13px;margin:0 0 16px}

/* mobile */
@media (max-width:900px){
  .menu-btn{display:flex}
  .layout{grid-template-columns:1fr}
  .sidebar{position:fixed;top:62px;left:0;bottom:0;width:260px;transform:translateX(-100%);transition:transform .25s ease;z-index:60;box-shadow:8px 0 24px -8px rgba(0,0,0,.25)}
  .sidebar.open{transform:translateX(0)}
  .scrim{display:none;position:fixed;inset:62px 0 0 0;background:rgba(0,0,0,.4);z-index:55}
  .scrim.show{display:block}
  .topbar .brand .t1{font-size:14px;max-width:60vw}
  .content{padding:14px}
  .stat-grid{grid-template-columns:repeat(2,1fr)!important}
  .topbar .me span.uname{display:none}
}

/* DASHBOARD */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px}
.stat{background:#fff;border-radius:14px;padding:16px;border:1px solid var(--line);position:relative;overflow:hidden}
.stat::after{content:"";position:absolute;right:-20px;top:-20px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(212,160,23,.2),transparent 70%)}
.stat .lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.stat .num{font-size:28px;font-weight:800;color:var(--maroon-2);margin:4px 0 2px;font-variant-numeric:tabular-nums}
.stat .sub{font-size:12px;color:var(--muted)}
.stat .ico{position:absolute;right:14px;top:14px;font-size:24px;opacity:.7}

/* MODAL */
.modal-back{position:fixed;inset:0;background:rgba(20,10,14,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:14px;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:16px;max-width:680px;width:100%;max-height:92vh;overflow:auto;box-shadow:0 30px 60px -20px rgba(0,0,0,.4);animation:slideUp .2s}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2}
.modal header h3{margin:0;color:var(--maroon-2);font-size:17px}
.modal .body{padding:18px 20px}
.modal .foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;background:#fbf6ee;border-radius:0 0 16px 16px}
.x-close{font-size:22px;color:var(--muted);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.x-close:hover{background:#fbf6ee;color:var(--maroon)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .full{grid-column:1/-1}
@media (max-width:600px){.form-grid{grid-template-columns:1fr}}

/* TOAST */
#toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;max-width:calc(100vw - 28px)}
.toast{background:#fff;border-left:4px solid var(--ok);padding:12px 16px;border-radius:10px;box-shadow:0 10px 30px -10px rgba(0,0,0,.3);min-width:240px;animation:slideIn .2s;font-size:14px;font-weight:500}
.toast.err{border-color:var(--bad)}
.toast.warn{border-color:var(--warn)}
.toast.info{border-color:#2563eb}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:
  radial-gradient(circle at 10% 10%,rgba(212,160,23,.18),transparent 40%),
  radial-gradient(circle at 90% 90%,rgba(122,31,43,.18),transparent 45%),
  linear-gradient(135deg,#1a0a0e,#3a1219)}
.login-card{background:#fff;border-radius:20px;padding:32px 28px;max-width:420px;width:100%;box-shadow:0 30px 80px -20px rgba(0,0,0,.6);position:relative;overflow:hidden}
.login-card::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--maroon),var(--gold),var(--maroon))}
.login-head{text-align:center;margin-bottom:22px}
.login-head img{width:96px;height:96px;border-radius:50%;border:3px solid var(--gold);box-shadow:0 8px 24px -8px rgba(122,31,43,.3)}
.login-head h1{margin:14px 0 2px;font-size:20px;color:var(--maroon-2)}
.login-head .ssub{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.04em}
.login-head .smot{font-size:11px;color:var(--gold-2);margin-top:4px;font-style:italic}
.role-tabs{display:flex;gap:6px;margin-bottom:16px;background:#f5f1ea;padding:5px;border-radius:12px}
.role-tab{flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted);text-align:center}
.role-tab.active{background:#fff;color:var(--maroon);box-shadow:0 2px 8px -2px rgba(0,0,0,.1)}
.help-box{margin-top:14px;padding:10px 12px;background:#fbf6ee;border-radius:10px;font-size:12px;color:var(--muted);text-align:center;border:1px dashed var(--line)}
.help-box b{color:var(--maroon)}

/* AVATAR */
.av{width:38px;height:38px;border-radius:50%;background:#fbf6ee;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:var(--maroon);overflow:hidden;border:1.5px solid var(--line);flex-shrink:0}
.av img{width:100%;height:100%;object-fit:cover}
.av.lg{width:90px;height:90px;font-size:26px;border:2px solid var(--gold)}
.av.xl{width:120px;height:120px;font-size:34px;border:3px solid var(--gold)}

.tag{display:inline-block;padding:2px 8px;background:#fbf6ee;border-radius:6px;font-size:11px;color:var(--maroon);font-weight:600}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .big{font-size:48px;margin-bottom:8px;opacity:.4}

/* PRINT */
@media print{
  #login,#app,#toasts{display:none!important}
  body{background:#fff!important;padding:0!important;margin:0!important}
  .modal-back{position:static!important;inset:auto!important;background:none!important;padding:0!important;display:block!important}
  .modal{box-shadow:none!important;max-width:none!important;max-height:none!important;border-radius:0!important;width:100%!important;animation:none!important}
  .modal>header,.modal .foot,.no-print{display:none!important}
  .modal .body{padding:0!important}
  .doc{border:2px solid #7a1f2b!important;max-width:none!important;margin:0!important;padding:18px!important;page-break-inside:avoid}
  .doc img{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact}
}

/* DESKTOP POLISH */
@media (min-width:901px){
  .content{padding:28px 32px}
  .page-title{font-size:26px}
  .stat-grid{grid-template-columns:repeat(4,1fr)}
  .form-grid{gap:16px}
  .card{padding:22px}
}
@media (min-width:1200px){
  .stat-grid{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
}
.layout{align-items:stretch}
.sidebar{position:sticky;top:62px;height:calc(100vh - 62px)}

/* RESULT-CARD photo box */
.rc-photo{width:110px;height:130px;border:2px solid var(--gold);border-radius:6px;overflow:hidden;background:#fbf6ee;display:flex;align-items:center;justify-content:center;color:var(--maroon);font-weight:700;font-size:32px;flex-shrink:0}
.rc-photo img{width:100%;height:100%;object-fit:cover}
.doc-head-row{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px}


/* RESULT CARD / RECEIPT */
.doc{max-width:760px;margin:0 auto;padding:28px;background:#fff;border:2px solid var(--maroon);border-radius:8px;color:#1c1410}
.doc-head{display:flex;align-items:center;gap:16px;border-bottom:3px double var(--maroon);padding-bottom:14px;margin-bottom:16px}
.doc-head img{width:78px;height:78px;border-radius:50%;border:2px solid var(--gold)}
.doc-head .h1{font-size:22px;font-weight:800;color:var(--maroon-2);margin:0}
.doc-head .h2{font-size:13px;color:var(--muted);margin:2px 0}
.doc-head .h3{font-size:11px;color:var(--gold-2);font-style:italic;margin-top:2px}
.doc h2.dtitle{text-align:center;background:var(--maroon);color:#fff;padding:8px;font-size:15px;letter-spacing:.1em;margin:0 0 14px;border-radius:6px}
.doc table{font-size:13px}
.doc th{background:#fbf6ee;color:var(--maroon)}
.doc .meta{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 18px;font-size:13px;margin-bottom:12px}
.doc .meta b{color:var(--maroon-2)}
.doc .sign{display:flex;justify-content:space-between;margin-top:30px;font-size:12px;color:var(--muted)}
.doc .sign div{text-align:center;border-top:1px solid #999;padding-top:4px;min-width:140px}

</style>
</head>

const LOGO = (document.querySelector('#login .login-head img')||{}).src || '';
function printDoc(rootEl){
  const node = rootEl.querySelector('.doc'); if(!node){ window.print(); return; }
  const w = window.open('','_blank','width=900,height=1100');
  if(!w){ window.print(); return; }
  const styles = Array.from(document.querySelectorAll('style,link[rel="stylesheet"]')).map(n=>n.outerHTML).join('\n');
  w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>Print</title>'+styles+'<style>body{margin:0;padding:20px;background:#fff}.doc{margin:0 auto}</style></head><body>'+node.outerHTML+'</body></html>');
  w.document.close();
  const imgs = w.document.images; let pending = imgs.length;
  const go = ()=>{ try{ w.focus(); w.print(); }catch(e){} setTimeout(()=>w.close(), 500); };
  if(!pending) return setTimeout(go, 150);
  Array.from(imgs).forEach(im=>{ if(im.complete) { if(--pending===0) go(); } else { im.onload=im.onerror=()=>{ if(--pending===0) go(); }; } });
}

const save = () => localStorage.setItem(K, JSON.stringify(DB));
const uid = (p='id') => p+'_'+Math.random().toString(36).slice(2,9);

/* ================== SESSION ================== */
let SESSION = (()=>{ try{ return JSON.parse(localStorage.getItem(SESSK)); }catch{ return null; } })();
const setSession = s => { SESSION=s; s? localStorage.setItem(SESSK,JSON.stringify(s)) : localStorage.removeItem(SESSK); };

/* ================== UI HELPERS ================== */
const $ = sel => document.querySelector(sel);
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})){
    if(k==='class') n.className=v;
    else if(k==='html') n.innerHTML=v;
    else if(k.startsWith('on') && typeof v==='function') n.addEventListener(k.slice(2).toLowerCase(),v);
    else if(v!==null && v!==undefined) n.setAttribute(k,v);
  }
  for(const k of kids.flat()){ if(k==null) continue; n.appendChild(typeof k==='string'?document.createTextNode(k):k); }
  return n;
};
function toast(msg, type='ok'){
  const t = el('div',{class:'toast '+(type==='ok'?'':type)}, msg);
  $('#toasts').appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .3s,transform .3s'; t.style.opacity='0'; t.style.transform='translateX(40px)'; setTimeout(()=>t.remove(),300); }, 3200);
}
function modal({title, body, footer, size}){
  const back = el('div',{class:'modal-back'});
  const m = el('div',{class:'modal'});
  if(size==='lg') m.style.maxWidth='900px';
  if(size==='xl') m.style.maxWidth='1100px';
  const close = ()=> back.remove();
  m.appendChild(el('header',{}, el('h3',{},title), el('button',{class:'x-close',onClick:close,title:'Close'},'×')));
  const b = el('div',{class:'body'}); if(typeof body==='string') b.innerHTML=body; else b.appendChild(body); m.appendChild(b);
  if(footer){ const f=el('div',{class:'foot'}); (Array.isArray(footer)?footer:[footer]).forEach(x=>f.appendChild(x)); m.appendChild(f); }
  back.appendChild(m);
  back.addEventListener('click', e=>{ if(e.target===back) close(); });
  document.getElementById('modalRoot').appendChild(back);
  return { close, root:m };
}
function confirm(msg){ return new Promise(res=>{
  const m = modal({title:'Confirm', body:el('div',{},el('p',{style:'margin:0 0 8px'},msg)),
    footer:[ el('button',{class:'btn ghost',onClick:()=>{m.close();res(false);}},'Cancel'),
            el('button',{class:'btn danger',onClick:()=>{m.close();res(true);}},'Confirm') ]});
});}

/* ================== AUTH ================== */
let loginRole = 'admin';
document.querySelectorAll('.role-tab').forEach(t=>{
  t.addEventListener('click', ()=>{
    document.querySelectorAll('.role-tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); loginRole = t.dataset.r;
    const h = document.getElementById('loginHelp');
    if(loginRole==='admin') h.innerHTML='Default Admin: <b>mpsjpk</b> / <b>mps78741</b>';
    else if(loginRole==='teacher') h.innerHTML='Teacher accounts are created by the Admin.';
    else h.innerHTML='Parent accounts are created by the Admin (username = parent phone or roll-based).';
  });
});
document.getElementById('loginForm').addEventListener('submit', e=>{
  e.preventDefault();
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value;
  const user = DB.users.find(x=>x.username.toLowerCase()===u.toLowerCase() && x.password===p && x.active!==false && x.role===loginRole);
  if(!user){ toast('Invalid credentials for selected role','err'); return; }
  setSession({ userId:user.id, role:user.role, name:user.name, ts:Date.now() });
  toast('Welcome, '+user.name+' 🎉','ok');
  boot();
});
document.getElementById('logoutBtn').addEventListener('click', ()=>{
  setSession(null); location.reload();
});

function studentForm(s){
  const isEdit = !!s;
  s = s || { id:uid('st'), roll:'', name:'', fatherName:'', phone:'', address:'', dob:'', classId:DB.classes[0]?.id||'', photo:'' };
  const f = el('form',{class:'form-grid', onSubmit:e=>{e.preventDefault(); submit();}});
  const fields = [
    ['roll','Roll Number',true,'text'],
    ['name','Student Name',true,'text'],
    ['fatherName','Father Name',false,'text'],
    ['phone','Parent Phone',false,'tel'],
    ['dob','Date of Birth',false,'date'],
  ];
  const inputs = {};
  fields.forEach(([k,l,r,t])=>{
    const w = el('div',{}, el('label',{class:'label'},l+(r?' *':'')), inputs[k]=el('input',{class:'input',type:t,value:s[k]||'',required:r? '':null}));
    f.appendChild(w);
  });
  // class
  const clsSel = el('select',{class:'input'},
    ...DB.classes.map(c=>el('option',{value:c.id, selected: c.id===s.classId?'':null},c.name+(c.section?' - '+c.section:''))));
  f.appendChild(el('div',{}, el('label',{class:'label'},'Class *'), clsSel));
  // address
  const addr = el('textarea',{class:'input',rows:'2'}); addr.value=s.address||'';
  f.appendChild(el('div',{class:'full'}, el('label',{class:'label'},'Address'), addr));

  // PHOTO
  let photoData = s.photo||'';
  const preview = el('div',{class:'av xl'}); const refreshPrev = ()=>{ preview.innerHTML=''; if(photoData) preview.appendChild(el('img',{src:photoData})); else preview.appendChild(document.createTextNode((inputs.name.value||'?').slice(0,1).toUpperCase())); };
  refreshPrev();
  inputs.name.addEventListener('input', refreshPrev);
  const fileInp = el('input',{type:'file',accept:'image/*',capture:'environment',class:'hidden', onchange:e=>{
    const file = e.target.files[0]; if(!file) return;
    const rd = new FileReader(); rd.onload = ()=>{ const img = new Image(); img.onload = ()=>{
      // square crop + resize 300x300
      const sz = Math.min(img.width,img.height); const sx=(img.width-sz)/2, sy=(img.height-sz)/2;
      const cv = document.createElement('canvas'); cv.width=300; cv.height=300;
      cv.getContext('2d').drawImage(img,sx,sy,sz,sz,0,0,300,300);
      photoData = cv.toDataURL('image/jpeg',0.85); refreshPrev();
    }; img.src=rd.result; }; rd.readAsDataURL(file);
  }});
  const photoWrap = el('div',{class:'full row',style:'gap:16px;align-items:center'},
    preview,
    el('div',{},
      el('div',{style:'font-weight:600;margin-bottom:6px'},'Student Photo'),
      el('div',{class:'row'},
        el('button',{class:'btn sm',type:'button',onClick:()=>{ fileInp.removeAttribute('capture'); fileInp.click(); }},'📁 Upload'),
        el('button',{class:'btn sm gold',type:'button',onClick:()=>{ fileInp.setAttribute('capture','environment'); fileInp.click(); }},'📷 Camera'),
        photoData? el('button',{class:'btn sm danger',type:'button',onClick:()=>{photoData='';refreshPrev();}},'Remove'):null
      ),
      el('div',{style:'font-size:11px;color:var(--muted);margin-top:6px'},'Auto-cropped square 300×300 for result cards.'),
      fileInp
    )
  );
  f.appendChild(photoWrap);

  function submit(){
    Object.keys(inputs).forEach(k=> s[k]=inputs[k].value.trim());
    s.classId = clsSel.value; s.address=addr.value.trim(); s.photo=photoData;
    if(!s.roll || !s.name){ toast('Roll and Name are required','err'); return; }
    if(isEdit){ const i = DB.students.findIndex(x=>x.id===s.id); DB.students[i]=s; toast('Student Updated Successfully'); }
    else { DB.students.push(s); toast('Student Added Successfully'); }
    save(); document.querySelector('.modal-back').remove(); render();
  }

  modal({title: (isEdit?'Edit':'Add')+' Student', body:f, size:'lg',
    footer:[
      el('button',{class:'btn ghost',type:'button',onClick:()=>document.querySelector('.modal-back').remove()},'Cancel'),
      el('button',{class:'btn',onClick:submit}, isEdit?'Update Student':'Save Student')
    ]});
}

  // annual
  v.appendChild(el('h3',{style:'color:var(--maroon-2);margin-top:16px'},'Annual Results'));
  const ann = DB.annualExams.filter(e=>e.classId===s?.classId && e.marks[s?.id] && Object.keys(e.marks[s.id]).length);
  if(!ann.length) v.appendChild(el('div',{class:'empty'},'No annual result yet.'));
  else ann.forEach(e=> v.appendChild(el('div',{class:'card',style:'margin-top:10px'},
    el('div',{class:'row',style:'justify-content:space-between'},el('div',{},el('b',{},e.name),' · ',el('span',{class:'tag'},'Year '+e.year)),
      el('button',{class:'btn gold sm',onClick:()=>resultCard(s,e)},'🎓 View Result Card')))));
};
VIEWS.p_progress = (v)=>{
  const u = DB.users.find(x=>x.id===SESSION.userId); const s = DB.students.find(x=>x.id===u?.studentId);
  v.appendChild(el('h1',{class:'page-title'},'Progress Report'));
  // subject-wise avg from weekly tests
  const bySub={};
  DB.weeklyTests.forEach(t=>{if(t.classId!==s?.classId)return; const m=t.marks[s.id]; if(m==null)return;
    bySub[t.subjectId]=bySub[t.subjectId]||{tot:0,obt:0,cnt:0}; bySub[t.subjectId].obt+=m; bySub[t.subjectId].tot+=t.total; bySub[t.subjectId].cnt++;});
  if(!Object.keys(bySub).length){ v.appendChild(el('div',{class:'empty'},'Not enough data to show progress yet.')); return; }
  const t = el('table',{},el('thead',{},el('tr',{},el('th',{},'Subject'),el('th',{},'Tests'),el('th',{},'Average %'),el('th',{},'Trend'))),
    el('tbody',{},...Object.entries(bySub).map(([sid,d])=>{const sub=DB.subjects.find(s=>s.id===sid); const pct=Math.round(d.obt/d.tot*100);
      return el('tr',{},el('td',{},sub?.name||'-'),el('td',{},String(d.cnt)),el('td',{},pct+'%'),el('td',{},pct>=80?'⭐ Excellent':pct>=60?'👍 Good':pct>=40?'⚠️ Improve':'❗ Weak'));})));
  v.appendChild(el('div',{class:'table-wrap'},t));
};

/* ================== BOOT ================== */
function boot(){
  if(!SESSION){ document.getElementById('login').style.display='flex'; document.getElementById('app').style.display='none'; return; }
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('meName').textContent = SESSION.name + ' · ' + SESSION.role;
  CURRENT = 'dashboard';
  renderNav(); render();
}
boot();
</script>
</body>
</html>
